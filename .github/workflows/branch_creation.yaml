name: Branch Creation

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source branch or tag to create the new branch from (e.g., main, v1.2.3)"
        required: true
        type: string
      new_branch_name:
        description: "New branch name to create (e.g., patch/2026-jan-4)"
        required: true
        type: string
      dry_run:
        description: "Run in dry mode (true/false)"
        required: false
        default: "false"
        type: string

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.read-repos.outputs.repositories }}
      new_branch: ${{ steps.validate.outputs.new_branch }}
      source_ref: ${{ steps.validate.outputs.source_ref }}
      source_ref_type: ${{ steps.validate.outputs.source_ref_type }}
    steps:
      - name: Checkout workflow branch (to read repo list)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate inputs and resolve source ref
        id: validate
        run: |
          set -euo pipefail

          NEW_BRANCH="${{ github.event.inputs.new_branch_name }}"
          NEW_BRANCH="${NEW_BRANCH#refs/heads/}"

          if [[ "$NEW_BRANCH" == refs/* ]]; then
            echo "ERROR: Provide a branch name like 'patch/x.y.z' or 'release/x.y.z' (not a full ref like '${{ github.event.inputs.new_branch_name }}')."
            exit 1
          fi

          if ! git check-ref-format --branch "$NEW_BRANCH" >/dev/null 2>&1; then
            echo "ERROR: '$NEW_BRANCH' is not a valid branch name."
            exit 1
          fi

          SOURCE_REF="${{ github.event.inputs.source_ref }}"

          # Determine if source_ref is a tag or branch
          if git rev-parse "refs/tags/$SOURCE_REF" >/dev/null 2>&1; then
            SOURCE_REF_TYPE="tag"
          elif git rev-parse "refs/remotes/origin/$SOURCE_REF" >/dev/null 2>&1; then
            SOURCE_REF_TYPE="branch"
          else
            echo "ERROR: '$SOURCE_REF' not found as a branch or tag in this repository."
            exit 1
          fi

          echo "Source ref: $SOURCE_REF_TYPE '$SOURCE_REF'"
          echo "New branch to create: $NEW_BRANCH"
          echo "new_branch=$NEW_BRANCH" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "source_ref_type=$SOURCE_REF_TYPE" >> "$GITHUB_OUTPUT"

      - name: Read repositories
        id: read-repos
        run: |
          set -euo pipefail

          REPOS_FILE=".github/workflows/repositories.csv"

          if [[ ! -f "$REPOS_FILE" ]]; then
            echo "ERROR: Repo list file not found: $REPOS_FILE"
            exit 1
          fi

          repos=$(grep -v '^[[:space:]]*$' "$REPOS_FILE" | tr -d '\r' | jq -R . | jq -sc .)
          echo "repositories=$repos" >> "$GITHUB_OUTPUT"

  create-branch:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.setup.outputs.repositories) }}
      fail-fast: false
    name: "${{ matrix.repo }}"
    env:
      GH_TOKEN: ${{ secrets.ORG_PAT }}
      NEW_BRANCH: ${{ needs.setup.outputs.new_branch }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      ORG: kulkarnisriranga9676
      REPO: ${{ matrix.repo }}
      SOURCE_REF_NAME: ${{ needs.setup.outputs.source_ref }}
      SOURCE_REF_TYPE: ${{ needs.setup.outputs.source_ref_type }}
    steps:
      - name: Create branch
        run: |
          set -euo pipefail

          echo "Processing $REPO..."

          if gh api "repos/$ORG/$REPO/git/ref/heads/$NEW_BRANCH" > /dev/null 2>&1; then
            echo "::error::Branch '$NEW_BRANCH' already exists in $REPO"
            exit 1
          fi

          source_sha=""
          if [[ "$SOURCE_REF_TYPE" == "branch" ]]; then
            if ! source_sha=$(gh api "repos/$ORG/$REPO/git/ref/heads/$SOURCE_REF_NAME" --jq '.object.sha' 2>/dev/null); then
              echo "::error::SKIP: $REPO does not have the selected branch '$SOURCE_REF_NAME'"
              exit 1
            fi
          elif [[ "$SOURCE_REF_TYPE" == "tag" ]]; then
            if ! source_sha=$(gh api "repos/$ORG/$REPO/commits/$SOURCE_REF_NAME" --jq '.sha' 2>/dev/null); then
              echo "::error::SKIP: $REPO has no tag '$SOURCE_REF_NAME'"
              exit 1
            fi
          else
            echo "::error::Unsupported ref type '$SOURCE_REF_TYPE' (expected 'branch' or 'tag')"
            exit 1
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: Would create '$NEW_BRANCH' in $REPO from $SOURCE_REF_TYPE '$SOURCE_REF_NAME' ($source_sha)"
            exit 0
          fi

          if ! gh api "repos/$ORG/$REPO/git/refs" \
            -f ref="refs/heads/$NEW_BRANCH" \
            -f sha="$source_sha" >/dev/null; then
            echo "::error::Failed to create '$NEW_BRANCH' in $REPO"
            exit 1
          fi

          echo "Created '$NEW_BRANCH' in $REPO"
