name: Branch / Tag Creation Pipeline
run-name: 'Creating ${{ github.event.inputs.new_ref_type }}: ${{ github.event.inputs.new_ref_name }} from ${{ github.event.inputs.source_ref }}'


on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source branch or tag to create from (e.g., main, v1.2.3)"
        required: true
        type: string
      new_ref_type:
        description: "What to create from the source ref"
        required: true
        type: choice
        default: "branch"
        options:
          - branch
          - tag
      new_ref_name:
        description: "New branch or tag name (e.g., patch/2026-jan-4 or v1.2.4)"
        required: true
        type: string
      dry_run:
        description: "Run in dry mode (true/false)"
        required: false
        default: "false"
        type: string

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.read-repos.outputs.repositories }}
      new_ref: ${{ steps.validate.outputs.new_ref }}
      new_ref_type: ${{ steps.validate.outputs.new_ref_type }}
      source_ref: ${{ steps.validate.outputs.source_ref }}
      source_ref_type: ${{ steps.validate.outputs.source_ref_type }}
    steps:
      - name: Checkout workflow branch (to read repo list)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate inputs and resolve source ref
        id: validate
        run: |
          set -euo pipefail

          NEW_REF="${{ github.event.inputs.new_ref_name }}"
          NEW_REF_TYPE="${{ github.event.inputs.new_ref_type }}"

          # Strip refs/heads/ prefix if accidentally provided for a branch
          if [[ "$NEW_REF_TYPE" == "branch" ]]; then
            NEW_REF="${NEW_REF#refs/heads/}"
          fi

          if [[ "$NEW_REF" == refs/* ]]; then
            echo "ERROR: Provide a plain name like 'patch/x.y.z' or 'v1.2.4' (not a full ref like '${{ github.event.inputs.new_ref_name }}')."
            exit 1
          fi

          if ! git check-ref-format --branch "$NEW_REF" >/dev/null 2>&1; then
            echo "ERROR: '$NEW_REF' is not a valid ref name."
            exit 1
          fi

          SOURCE_REF="${{ github.event.inputs.source_ref }}"

          # Determine if source_ref is a tag or branch
          if git rev-parse "refs/tags/$SOURCE_REF" >/dev/null 2>&1; then
            SOURCE_REF_TYPE="tag"
          elif git rev-parse "refs/remotes/origin/$SOURCE_REF" >/dev/null 2>&1; then
            SOURCE_REF_TYPE="branch"
          else
            echo "ERROR: '$SOURCE_REF' not found as a branch or tag in this repository."
            exit 1
          fi

          echo "Source ref: $SOURCE_REF_TYPE '$SOURCE_REF'"
          echo "Will create $NEW_REF_TYPE: '$NEW_REF'"
          echo "new_ref=$NEW_REF" >> "$GITHUB_OUTPUT"
          echo "new_ref_type=$NEW_REF_TYPE" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "source_ref_type=$SOURCE_REF_TYPE" >> "$GITHUB_OUTPUT"

      - name: Read repositories
        id: read-repos
        run: |
          set -euo pipefail

          REPOS_FILE=".github/workflows/repositories.csv"

          if [[ ! -f "$REPOS_FILE" ]]; then
            echo "ERROR: Repo list file not found: $REPOS_FILE"
            exit 1
          fi

          repos=$(grep -v '^[[:space:]]*$' "$REPOS_FILE" | tr -d '\r' | jq -R . | jq -sc .)
          echo "repositories=$repos" >> "$GITHUB_OUTPUT"

  create-ref:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.setup.outputs.repositories) }}
      fail-fast: false
    name: "${{ matrix.repo }}"
    env:
      GH_TOKEN: ${{ secrets.ORG_PAT }}
      NEW_REF: ${{ needs.setup.outputs.new_ref }}
      NEW_REF_TYPE: ${{ needs.setup.outputs.new_ref_type }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      ORG: kulkarnisriranga9676
      REPO: ${{ matrix.repo }}
      SOURCE_REF_NAME: ${{ needs.setup.outputs.source_ref }}
      SOURCE_REF_TYPE: ${{ needs.setup.outputs.source_ref_type }}
    steps:
      - name: Create branch or tag
        run: |
          set -euo pipefail

          echo "Processing $REPO..."

          # Resolve the git ref path for the new ref
          if [[ "$NEW_REF_TYPE" == "branch" ]]; then
            NEW_GIT_REF="refs/heads/$NEW_REF"
          elif [[ "$NEW_REF_TYPE" == "tag" ]]; then
            NEW_GIT_REF="refs/tags/$NEW_REF"
          else
            echo "::error::Unsupported new_ref_type '$NEW_REF_TYPE' (expected 'branch' or 'tag')"
            exit 1
          fi

          if gh api "repos/$ORG/$REPO/git/ref/${NEW_GIT_REF#refs/}" > /dev/null 2>&1; then
            echo "::error::$NEW_REF_TYPE '$NEW_REF' already exists in $REPO"
            exit 1
          fi

          source_sha=""
          if [[ "$SOURCE_REF_TYPE" == "branch" ]]; then
            if ! source_sha=$(gh api "repos/$ORG/$REPO/git/ref/heads/$SOURCE_REF_NAME" --jq '.object.sha' 2>/dev/null); then
              echo "::error::SKIP: $REPO does not have the selected branch '$SOURCE_REF_NAME'"
              exit 1
            fi
          elif [[ "$SOURCE_REF_TYPE" == "tag" ]]; then
            if ! source_sha=$(gh api "repos/$ORG/$REPO/commits/$SOURCE_REF_NAME" --jq '.sha' 2>/dev/null); then
              echo "::error::SKIP: $REPO has no tag '$SOURCE_REF_NAME'"
              exit 1
            fi
          else
            echo "::error::Unsupported ref type '$SOURCE_REF_TYPE' (expected 'branch' or 'tag')"
            exit 1
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: Would create $NEW_REF_TYPE '$NEW_REF' in $REPO from $SOURCE_REF_TYPE '$SOURCE_REF_NAME' ($source_sha)"
            exit 0
          fi

          if ! gh api "repos/$ORG/$REPO/git/refs" \
            -f ref="$NEW_GIT_REF" \
            -f sha="$source_sha" >/dev/null; then
            echo "::error::Failed to create $NEW_REF_TYPE '$NEW_REF' in $REPO"
            exit 1
          fi

          echo "Created $NEW_REF_TYPE '$NEW_REF' in $REPO"
